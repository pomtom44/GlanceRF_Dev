<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlanceRF</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/main.css?v=__CACHE_BUST__">
    <link rel="stylesheet" href="/static/css/menu.css?v=__CACHE_BUST__">
    <style>
        #aspect-container {{
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
        }}
        .grid-layout {{ {grid_css} }}
    </style>
    <style>{module_css}</style>
</head>
<body>
    <div id="glancerf-page-loading" style="position:fixed;inset:0;background:#0d1117;display:none;align-items:center;justify-content:center;color:#8b949e;font-size:16px;z-index:9999;">Loading...</div>
    <div id="ws-lost-warning">
        <span class="ws-lost-label">WebSocket lost</span>
        <span id="ws-lost-timer">Disconnected: 0m 0s</span>
    </div>
    <div id="update-notification">
        <span class="update-close" onclick="this.parentElement.classList.remove('show')">&times;</span>
        <div id="update-notification-content"></div>
    </div>
    <div id="glancerf-menu" role="dialog" aria-modal="true" aria-label="Menu">
        <div class="glancerf-menu-overlay" id="glancerf-menu-overlay"></div>
        <div class="glancerf-menu-panel">
__GLANCERF_MENU_PANEL__
        </div>
    </div>
    <div id="aspect-container">
        <div class="grid-layout">
            {grid_html}
        </div>
    </div>
    <script>
        window.GLANCERF_MODULE_SETTINGS = {module_settings_json};
        window.GLANCERF_MODULES_SETTINGS_SCHEMA = {modules_settings_schema_json};
        window.GLANCERF_MAP_OVERLAY_MODULES = {map_overlay_modules_json};
        window.GLANCERF_MAP_OVERLAY_LAYOUT = {map_overlay_layout_json};
        window.GLANCERF_MAP_INSTANCE_LIST = {map_instance_list_json};
        window.GLANCERF_SETUP_CALLSIGN = {setup_callsign_json};
        window.GLANCERF_SETUP_LOCATION = {setup_location_json};
        window.GLANCERF_ON_THE_AIR_SHORTCUT = {on_the_air_shortcut_json};
        window.GLANCERF_ON_THE_AIR = false;
        window.glancerfSettingsForElement = function(el) {{
            var all = window.GLANCERF_MODULE_SETTINGS || {{}};
            if (!el || !el.getAttribute) return {{}};
            var sk = el.getAttribute('data-settings-key');
            if (sk && all[sk]) return all[sk];
            var r = el.getAttribute('data-row');
            var c = el.getAttribute('data-col');
            var cellKey = (r != null && c != null) ? r + '_' + c : '';
            return (cellKey && all[cellKey]) ? all[cellKey] : {{}};
        }};
    </script>
    <script src="/static/js/menu.js?v=__CACHE_BUST__"></script>
    <script src="/static/js/main.js?v=__CACHE_BUST__"></script>
    <script>{module_js}</script>
</body>
</html>
