<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlanceRF - Updates</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/updates.css">
    <link rel="stylesheet" href="/static/css/menu.css">
</head>
<body>
    <div id="glancerf-menu" role="dialog" aria-modal="true" aria-label="Menu">
        <div class="glancerf-menu-overlay" id="glancerf-menu-overlay"></div>
        <div class="glancerf-menu-panel">
__GLANCERF_MENU_PANEL__
        </div>
    </div>
    <div class="glancerf-page-container">
        <a href="/" class="glancerf-page-back-link">&larr; Back to Main</a>
        <h1>Updates</h1>
        <p class="update-versions" id="update-versions">Checking for updates...</p>
        <div class="update-notes" id="update-release-notes"></div>
        <p class="update-docker-hint" id="update-docker-hint" style="display:none;">In Docker: pull the new image and recreate the container instead of in-app update.</p>
        <button type="button" class="btn btn-primary" id="update-btn" disabled>Check for updates</button>
        <div class="update-progress" id="update-progress" style="display:none;">
            <p class="update-progress-step" id="update-progress-step"></p>
            <p class="update-progress-message" id="update-progress-message"></p>
        </div>
        <p class="update-result" id="update-result" style="display:none;"></p>
    </div>
    <script src="/static/js/menu.js"></script>
    <script>
        (function() {
            var versionsEl = document.getElementById('update-versions');
            var notesEl = document.getElementById('update-release-notes');
            var dockerHint = document.getElementById('update-docker-hint');
            var btn = document.getElementById('update-btn');
            var resultEl = document.getElementById('update-result');
            var progressDiv = document.getElementById('update-progress');
            var progressStepEl = document.getElementById('update-progress-step');
            var progressMessageEl = document.getElementById('update-progress-message');
            var progressPollId = null;

            function loadStatus() {
                if (!versionsEl || !btn) return;
                versionsEl.textContent = 'Checking for updates...';
                if (notesEl) notesEl.textContent = '';
                if (dockerHint) dockerHint.style.display = 'none';
                btn.disabled = true;
                if (resultEl) { resultEl.style.display = 'none'; resultEl.textContent = ''; }
                if (progressDiv) progressDiv.style.display = 'none';
                fetch('/api/update-status')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var cur = data.current_version || '—';
                        var lat = data.latest_version;
                        var avail = data.update_available;
                        if (data.docker_mode && dockerHint) dockerHint.style.display = 'block';
                        if (lat != null) {
                            versionsEl.textContent = 'Current: ' + cur + (avail ? '  |  Latest: ' + lat : '  |  Latest: ' + lat + ' (you\'re up to date)');
                        } else {
                            versionsEl.textContent = 'Current: ' + cur + '  |  Latest: —';
                        }
                        if (notesEl && data.release_notes) notesEl.textContent = data.release_notes;
                        btn.textContent = avail ? 'Update now' : 'Check for updates';
                        btn.disabled = false;
                        btn._updateAvailable = !!avail;
                        if (data.docker_mode) btn._updateAvailable = false;
                    })
                    .catch(function() {
                        versionsEl.textContent = 'Current: —  |  Check failed.';
                        btn.textContent = 'Check for updates';
                        btn.disabled = false;
                        btn._updateAvailable = false;
                    });
            }

            function stopProgressPoll() {
                if (progressPollId) { clearInterval(progressPollId); progressPollId = null; }
            }

            function pollProgress() {
                fetch('/api/update-progress')
                    .then(function(r) { return r.json(); })
                    .then(function(p) {
                        if (progressStepEl) progressStepEl.textContent = p.step || '';
                        if (progressMessageEl) progressMessageEl.textContent = p.message || '';
                        if (!p.running) {
                            stopProgressPoll();
                            if (resultEl) {
                                resultEl.style.display = 'block';
                                resultEl.textContent = p.final_message || (p.success ? 'Done.' : 'Update failed.');
                                if (p.success) resultEl.textContent += ' Restarting in 10s...';
                            }
                            if (btn) btn.disabled = false;
                            if (progressDiv) progressDiv.style.display = 'none';
                            if (p.success) loadStatus();
                        }
                    })
                    .catch(function() { stopProgressPoll(); if (btn) btn.disabled = false; });
            }

            if (btn && resultEl) {
                btn.addEventListener('click', function() {
                    if (btn._updateAvailable) {
                        btn.disabled = true;
                        if (resultEl) { resultEl.style.display = 'none'; resultEl.textContent = ''; }
                        if (progressDiv) {
                            progressDiv.style.display = 'block';
                            if (progressStepEl) progressStepEl.textContent = 'Starting...';
                            if (progressMessageEl) progressMessageEl.textContent = '';
                        }
                        fetch('/api/apply-update', { method: 'POST' })
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                if (data.started) {
                                    progressPollId = setInterval(pollProgress, 800);
                                    pollProgress();
                                } else {
                                    resultEl.style.display = 'block';
                                    resultEl.textContent = data.success ? ('Update applied. Restarting in 10s...') : ('Failed: ' + (data.message || ''));
                                    btn.disabled = false;
                                    if (progressDiv) progressDiv.style.display = 'none';
                                    if (data.success) loadStatus();
                                }
                            })
                            .catch(function() {
                                resultEl.style.display = 'block';
                                resultEl.textContent = 'Update request failed.';
                                btn.disabled = false;
                                if (progressDiv) progressDiv.style.display = 'none';
                            });
                    } else {
                        loadStatus();
                    }
                });
            }

            loadStatus();
        })();
    </script>
</body>
</html>
